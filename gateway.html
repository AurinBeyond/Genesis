<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway | Aurin OS v10.1</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: white;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            overflow: hidden;
        }

        .gateway-container {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .system-status {
            margin-bottom: 30px;
            font-size: 0.75rem;
            letter-spacing: 4px;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #d4af37;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
            box-shadow: 0 0 12px #d4af37;
            animation: pulse 2.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.9); }
        }

        .gateway-title {
            font-weight: 800;
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0 0 15px;
            letter-spacing: -2px;
        }

        .gateway-subtitle {
            opacity: 0.5;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 50px;
        }

        .lang-select {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .lang-btn {
            padding: 12px 35px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-transform: uppercase;
        }

        .lang-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .lang-btn.disabled {
            opacity: 0.25;
            cursor: not-allowed;
            pointer-events: none;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .gateway-note {
            margin-top: 80px;
            font-size: 0.7rem;
            opacity: 0.35;
            max-width: 350px;
            line-height: 1.8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .legal-link {
            color: inherit;
            text-decoration: underline;
            transition: opacity 0.2s;
        }

        .legal-link:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="gateway-container">
        <div class="system-status">
            <span class="status-dot"></span> System Operational // v10.1 Genesis
        </div>

        <h1 class="gateway-title">AURIN OS</h1>
        <p class="gateway-subtitle">Vali oma sisenemispunkt</p>

        <div class="lang-select">
            <a href="index.html" class="lang-btn">Estonian</a>
            <span class="lang-btn disabled">English (Soon)</span>
        </div>

        <div class="gateway-note">
            Hoiatus: See süsteem on loodud enesevaatluseks. <br>
            Jätkates nõustute <a href="disclaimer.html" class="legal-link">vastutuse välistamise tingimustega</a>.
        </div>
    </div>
</body>
</html>
