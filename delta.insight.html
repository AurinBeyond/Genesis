<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELTA // AURIN OS</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: rgba(255, 255, 255, 0.9);
            --accent-color: #d4af37;
            --dim-text: rgba(255, 255, 255, 0.15);
            --input-bg: rgba(255, 255, 255, 0.03);
            --border-soft: rgba(255, 255, 255, 0.08);
        }

        /* Globaalne stabiliseerimine */
        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Mobiilisõbralik kerimine kui klaviatuur avaneb */
            overflow-x: hidden;
            overflow-y: auto;
        }

        .status-bar {
            position: fixed;
            top: 25px;
            left: 25px;
            font-family: monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--dim-text);
            text-transform: uppercase;
            z-index: 100;
        }

        #interface {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 40px 0;
            animation: fadeIn 1.5s ease;
        }

        .label {
            font-family: monospace;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.8);
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 40px;
        }

        textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-soft);
            border-radius: 0;
            padding: 25px;
            color: var(--text-color);
            font-family: inherit;
            font-size: 1.1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: all 0.4s ease;
            min-height: 160px;
        }

        textarea:focus-visible {
            border-color: rgba(212, 175, 55, 0.4);
            background: rgba(255, 255, 255, 0.05);
            outline: 1px solid var(--accent-color);
            outline-offset: 4px;
        }

        .char-count {
            position: absolute;
            bottom: -25px;
            right: 0;
            font-family: monospace;
            font-size: 10px;
            color: var(--dim-text);
            letter-spacing: 1px;
        }

        #deposit-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-color);
            padding: 15px 40px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            font-size: 0.8rem;
            outline: none;
        }

        #deposit-btn:hover:not(:disabled),
        #deposit-btn:focus-visible {
            border-color: var(--accent-color);
            color: var(--accent-color);
            box-shadow: 0 0 20px rgba(212, 175, 85, 0.1);
        }

        #deposit-btn:focus-visible {
            outline: 1px solid var(--accent-color);
            outline-offset: 4px;
        }

        #deposit-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        #confirmation {
            display: none;
            opacity: 0;
            font-size: 1rem;
            line-height: 1.8;
            color: var(--accent-color);
            transition: opacity 0.8s ease;
        }

        .footer-nav {
            margin-top: 50px;
            display: none;
        }

        .nav-link {
            text-decoration: none;
            color: var(--dim-text);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
            transition: all 0.3s;
            outline: none;
            padding: 5px;
        }

        .nav-link:hover,
        .nav-link:focus-visible {
            color: var(--text-color);
            border-bottom-color: var(--accent-color);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="status-bar">Status: Processing Insight // Node: Delta</div>

    <div id="interface">
        <div id="form-layer">
            <div class="label">Insight Deposit</div>
            <h1>Mida sa märkasid?</h1>
            
            <div class="input-wrapper">
                <textarea id="insight" maxlength="180" placeholder="Üks puhas tähelepanek..."></textarea>
                <div class="char-count" id="chars">0 / 180</div>
            </div>

            <button id="deposit-btn" disabled>Deponeeri tähelepanek</button>
        </div>

        <div id="confirmation">
            <div class="label">Log Successful</div>
            <p>Tähelepanek on lukustatud.<br>Ära seleta seda edasi. Liigu edasi selgemana.</p>
            
            <div class="footer-nav" id="next-step">
                <a href="core.html" class="nav-link">Tagasi keskusse</a>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'aurin_os_delta_note';
        const textarea = document.getElementById('insight');
        const chars = document.getElementById('chars');
        const btn = document.getElementById('deposit-btn');
        const formLayer = document.getElementById('form-layer');
        const confirmation = document.getElementById('confirmation');
        const nextStep = document.getElementById('next-step');

        // Kontrolli salvestatud olekut laadimisel
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                textarea.value = saved;
                updateCounter();
            }
            textarea.focus();
        });

        function updateCounter() {
            const length = textarea.value.trim().length;
            chars.textContent = `${textarea.value.length} / 180`;
            btn.disabled = length < 5;
        }

        textarea.addEventListener('input', updateCounter);

        btn.addEventListener('click', () => {
            const userInsight = textarea.value.trim();
            if (userInsight.length < 5) return;

            // Salvestamine brauseri mällu
            localStorage.setItem(STORAGE_KEY, userInsight);

            // Ülemineku animatsioon
            formLayer.style.opacity = '0';
            setTimeout(() => {
                formLayer.style.display = 'none';
                confirmation.style.display = 'block';
                setTimeout(() => { confirmation.style.opacity = '1'; }, 50);
                
                nextStep.style.display = 'block';
                
                // Fookus järgmisele sammule
                const link = nextStep.querySelector('a');
                link.focus();
            }, 800);
        });
    </script>
</body>
</html>
