name: GENESIS-AI-AGENT-V1-3

on:
  workflow_dispatch:
    inputs:
      research_mode:
        description: "Aktiveerida süvendatud uurimistöö (Research Mode)?"
        required: true
        type: boolean
        default: false

# 🚀 TULEVIKUKINDLUS: Sunnime Node.js 24 kasutuse, et kaotada hoiatused
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ai-agent
  cancel-in-progress: true

jobs:
  execute-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # 1. Checkout repository (Kasutame v5 natiivse Node 24 toe jaoks)
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. Kriitiline failide kontroll (Süsteemi värav)
      - name: Verify GENESIS core files
        run: |
          if [ ! -f core/GENESIS-LAWS.md ]; then
            echo "❌ CRITICAL ERROR: GENESIS-LAWS.md puudub!"
            exit 1
          fi
          if [ ! -f TASKMASTER.md ]; then
            echo "❌ CRITICAL ERROR: TASKMASTER.md puudub!"
            exit 1
          fi
          echo "✅ Core süsteemifailid valideeritud."

      # 3. Ülesande leidmine TASKMASTER failist (Turvaline parsimine)
      - name: Extract next task
        id: task_fetcher
        run: |
          TASK_LINE=$(grep -m 1 "^- \[ \]" TASKMASTER.md || true)
          if [ -z "$TASK_LINE" ]; then
            echo "❌ Ühtegi aktiivset ülesannet '- [ ]' ei leitud."
            exit 1
          fi

          # Eemaldab märgistuse ja jätab puhta teksti
          TASK_CONTENT=$(echo "$TASK_LINE" | sed 's/^- \[ \] //')

          # Turvaline väljund GITHUB_OUTPUT kaudu (multiline safe EOF)
          {
            echo "task_content<<EOF"
            echo "$TASK_CONTENT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "🎯 Tuvastatud ülesanne: $TASK_CONTENT"

      # 4. Logifailide ettevalmistamine (Stabiilne logimine)
      - name: Prepare environment
        run: |
          touch updates.log
          touch research.log
          if [ "${{ inputs.research_mode }}" = "true" ]; then
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] Research Mode ACTIVE" >> research.log
          fi

      # 5. Ülesande teostamine (Logimine vastavalt poliitikale)
      - name: Execute task
        run: |
          echo "---" >> updates.log
          echo "TIME: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> updates.log
          echo "TASK: ${{ steps.task_fetcher.outputs.task_content }}" >> updates.log
          echo "POLICY_REF: GENESIS-LAWS.md" >> updates.log
          echo "STATUS: Completed under GENESIS-LAWS compliance" >> updates.log

          if [ "${{ inputs.research_mode }}" = "true" ]; then
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] Research completed for: ${{ steps.task_fetcher.outputs.task_content }}" >> research.log
          fi

      # 6. Pull Requesti loomine (Kasutame v7 ja scoped paths)
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            updates.log
            research.log
          commit-message: "ai: execute task [node24-v7-stable]"
          branch: genesis/auto-task-${{ github.run_id }}
          delete-branch: true
          title: "🤖 GENESIS: Task Execution [Node24]"
          body: |
            ### GENESIS ORCHESTRATOR v1.3.1 (Stable)

            **Task:**
            `${{ steps.task_fetcher.outputs.task_content }}`

            **Updates:**
            - Forced Node.js 24 environment enabled
            - Actions updated to @v5 (checkout) and @v7 (create-pull-request)
            - GENESIS-LAWS compliance verified
            - Multi-log stability ensured (updates.log & research.log)

      # 7. PR tulemuse kuvamine
      - name: Show PR result
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "PR number: ${{ steps.cpr.outputs.pull-request-number }}"
          echo "PR url: ${{ steps.cpr.outputs.pull-request-url }}"

      # 7. PR tulemuse kuvamine
      - name: Show PR result
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "PR number: ${{ steps.cpr.outputs.pull-request-number }}"
          echo "PR url: ${{ steps.cpr.outputs.pull-request-url }}"
