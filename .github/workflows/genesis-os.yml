name: GENESIS-OS-DEPLOY

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# 🚀 TULEVIKUKINDLUS: Sunnime Node.js 24 keskkonna ja kaotame hoiatused
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout (v5 on natiivne Node 24 toega versioon)
      - name: Checkout
        uses: actions/checkout@v5

      # 2. Pages seadistamine (v4 on stabiilne ja verifitseeritud versioon)
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 3. Failide pakkimine spetsiaalsesse Pages-formaati
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # Laeb üles kogu repositooriumi juure (või täpsusta kaust)

      # 4. Deploiement GitHubi serveritesse (v5 on uusim stabiilne versioon)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
