# ARKANA-OS // CI/CD PIPELINE v1.4
# See workflow teostab automaatse kontrolli ja genereerib arhitektuuri raporti.

name: ARKANA-OS CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Strict file audit
        run: |
          for file in index.html void.html core.html delta-insight.html sigma-core.html sigma-protocol.html assets/css/style.css; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing critical system node: $file"
              exit 1
            fi
          done
          echo "All required system nodes exist."

      - name: Validate stylesheet links
        run: |
          for file in index.html void.html core.html delta-insight.html sigma-core.html sigma-protocol.html; do
            if ! grep -q 'assets/css/style.css' "$file"; then
              echo "ERROR: $file is not linked to assets/css/style.css"
              exit 1
            fi
          done
          echo "All nodes are correctly linked to the global stylesheet."

      - name: Generate architecture status report
        run: |
          mkdir -p system
          cat > system/architecture-node-21.md <<'EOF'
          # 🗝️ ARKANA-OS // ARCHITECTURE NODE 21: GENESIS COMPLETE

          ## 1. OPERATIIVNE STAATUS
          - **Faza:** GENESIS (Päev 1)
          - **Staatus:** 🟢 STABIILNE / AKTIIVNE
          - **Versioon:** v1.4 (Infrastructure Grade)

          ---

          ## 2. TEHTUD TÖÖDE AUDIT (DONE)

          ### 🛰️ Infrastruktuur (Node 20)
          - [x] **CI/CD Aktiveerimine:** `.github/workflows/deploy.yml` on asukohas ja töötab.
          - [x] **Turvapiirangud:** `write` õigused on piiratud ainult `deploy` etapile.
          - [x] **Automaatne Audit:** Süsteem kontrollib nüüd iga push'i puhul failide olemasolu ja linkide terviklikkust.

          ### 🎨 Disain ja Struktuur (Node 21)
          - [x] **CSS Tsentraliseerimine:** Kõik stiilid on viidud faili `/assets/css/style.css`.
          - [x] **HTML Sanitization:** 6 põhifaili on puhastatud sise-CSS-ist.
          - [x] **Global Linking:** Kõik sõlmed on ühendatud ühtse stiililehega.

          ---

          ## 3. SÜSTEEMI TERVIS
          GitHub Actions kontrollis ja kinnitas:
          1. index.html -> VALID
          2. void.html -> VALID
          3. core.html -> VALID
          4. delta-insight.html -> VALID
          5. sigma-core.html -> VALID
          6. sigma-protocol.html -> VALID
          7. assets/css/style.css -> DETECTED

          ---

          ## 4. JÄRGMINE ETAPP: PÄEV 2 (VISUAL & UX)
          - **Fookus:** Mobiilivaate (Responsive) peenhäälestus.
          - **Eesmärk:** Kognitiivse müra vähendamine.
          
          ---
          **Kinnitatud:** ARKANA-AI-AGENT
          **Kuupäev:** 2026-04-01
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    needs: validate-and-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
---
**Kinnitatud:** ARKANA-AI-AGENT
**Kuupäev:** 2026-04-01
