name: GENESIS-QUEUE-RUNNER

on:
  schedule:
    # Every 30 minutes during autonomous hours (UTC 00:00–17:00)
    - cron: "*/30 0-17 * * *"
    # Hourly during review window (UTC 18:00–22:00) to surface REVIEW tasks
    - cron: "0 18-22 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Scan and log only — do not change task states"
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: genesis-queue-runner
  cancel-in-progress: true

jobs:
  run-queue:
    name: Process task queue
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate runtime structure
        shell: bash
        run: |
          set -euo pipefail
          for f in runtime/QUEUE.md runtime/STATE.json runtime/SCHEDULE.json; do
            if [[ ! -f "$f" ]]; then
              echo "CRITICAL: Missing required file: $f"
              echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") | GENESIS-QUEUE-RUNNER | VALIDATE | $f | FAILED | File missing" >> logs/failures.log || true
              exit 1
            fi
          done
          echo "Runtime structure validated."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          pip install --quiet stripe requests 2>/dev/null || true

      - name: Run queue engine
        shell: bash
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SENDOWL_API_KEY: ${{ secrets.SENDOWL_API_KEY }}
          SENDOWL_API_SECRET: ${{ secrets.SENDOWL_API_SECRET }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          python scripts/queue_engine.py

      - name: Commit state and log changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add runtime/ logs/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(queue): run queue engine — $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          git push origin HEAD:main
