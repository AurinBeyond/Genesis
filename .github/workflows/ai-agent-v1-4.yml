name: GENESIS-AI-AGENT-V1-4

on:
  workflow_dispatch:
    inputs:
      research_mode:
        description: "Aktiveerida süvendatud uurimistöö (Research Mode)?"
        required: true
        type: boolean
        default: false
  schedule:
    - cron: "17 * * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: ai-agent
  cancel-in-progress: true

jobs:
  execute-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Verify GENESIS core files
        shell: bash
        run: |
          if [ ! -f core/GENESIS-LAWS.md ] || [ ! -f TASKMASTER.md ]; then
            echo "❌ CRITICAL ERROR: GENESIS-LAWS.md või TASKMASTER.md puudub!"
            exit 1
          fi
          echo "✅ Core süsteemifailid valideeritud."

      - name: Extract next open task
        id: task_fetcher
        shell: bash
        run: |
          LINE_NUM=$(grep -n -m 1 "^- \[ \]" TASKMASTER.md | cut -d: -f1 || true)

          if [ -z "$LINE_NUM" ]; then
            echo "has_task=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Avatud ülesandeid ei leitud."
            exit 0
          fi

          TASK_LINE=$(sed -n "${LINE_NUM}p" TASKMASTER.md)
          TASK_CONTENT=$(echo "$TASK_LINE" | sed 's/^- \[ \] //')

          echo "has_task=true" >> "$GITHUB_OUTPUT"
          echo "line_num=$LINE_NUM" >> "$GITHUB_OUTPUT"

          {
            echo "task_content<<EOF"
            echo "$TASK_CONTENT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "🎯 Task: $TASK_CONTENT (Line: $LINE_NUM)"

      - name: Update TASKMASTER and logs
        if: steps.task_fetcher.outputs.has_task == 'true'
        shell: bash
        run: |
          L_NUM="${{ steps.task_fetcher.outputs.line_num }}"
          
          # Märgi ülesanne tehtuks [x]
          sed -i "${L_NUM}s/^- \\[ \\]/- [x]/" TASKMASTER.md

          # Logi täiendamine
          touch updates.log
          {
            echo "---"
            echo "TIME: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "TASK: ${{ steps.task_fetcher.outputs.task_content }}"
            echo "STATUS: Completed by GENESIS v1.4"
          } >> updates.log

      - name: Commit and push
        if: steps.task_fetcher.outputs.has_task == 'true'
        shell: bash
        run: |
          git config user.name "genesis-agent"
          git config user.email "actions@github.com"

          git add TASKMASTER.md updates.log

          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit."
            exit 0
          fi

          git commit -m "ai: execute and close task [genesis-v1.4]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Final status
        shell: bash
        run: |
          if [ "${{ steps.task_fetcher.outputs.has_task }}" = "true" ]; then
            echo "✅ Task executed and pushed successfully."
          else
            echo "ℹ️ No open tasks found."
          fi
