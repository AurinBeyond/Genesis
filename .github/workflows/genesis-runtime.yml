name: GENESIS-RUNTIME

on:
  workflow_dispatch:
    inputs:
      execution_mode:
        description: "Execution mode: direct or pr"
        required: true
        type: choice
        options:
          - direct
          - pr
        default: pr
      target_branch:
        description: "Target branch to update"
        required: true
        default: "main"
      task_scope:
        description: "Optional task scope marker (e.g. ACTIVE TASKS). Leave empty to use ACTIVE TASKS section"
        required: false
        default: ""
      log_only:
        description: "If true, validate and log only without changing task status"
        required: true
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WORKFLOW_NAME: GENESIS-RUNTIME

permissions:
  contents: read

concurrency:
  group: genesis-runtime
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    outputs:
      has_task: ${{ steps.task.outputs.has_task }}
      task_line: ${{ steps.task.outputs.task_line }}
      clean_task: ${{ steps.task.outputs.clean_task }}
      raw_task: ${{ steps.task.outputs.raw_task }}
      branch_name: ${{ steps.task.outputs.branch_name }}
      timestamp_utc: ${{ steps.meta.outputs.timestamp_utc }}
      run_id: ${{ steps.meta.outputs.run_id }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Verify core files
        run: |
          set -euo pipefail
          for f in GENESIS-LAWS.md STATE.md MODE.md INPUT.md OUTPUT.md TASK.md AGENT.md AGENTS-CONFIG.md TASKMASTER.md; do
            [[ -f "$f" ]] || { echo "Missing $f"; exit 1; }
          done

      - id: meta
        run: |
          echo "timestamp_utc=$(date -u +"%Y-%m-%d %H:%M UTC")" >> "$GITHUB_OUTPUT"
          echo "run_id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - id: task
        run: |
          set -euo pipefail

          task_file="TASKMASTER.md"
          scope="${{ inputs.task_scope }}"

          [[ -s "$task_file" ]] || { echo "has_task=false" >> "$GITHUB_OUTPUT"; exit 0; }

          # default scope
          if [[ -z "$scope" ]]; then
            scope="ACTIVE TASKS"
          fi

          start_line="$(
            awk -v scope="$scope" '
              index($0, "## ") == 1 && index($0, scope) > 0 { print NR; exit }
            ' "$task_file"
          )"

          [[ -n "${start_line:-}" ]] || { echo "has_task=false" >> "$GITHUB_OUTPUT"; exit 0; }

          end_line="$(
            awk -v start="$start_line" '
              NR > start && /^## / { print NR - 1; exit }
              END { print NR }
            ' "$task_file"
          )"

          absolute_line="$(
            awk -v start="$start_line" -v end="$end_line" '
              NR >= start && NR <= end && /^- \[ \] / { print NR; exit }
            ' "$task_file"
          )"

          [[ -n "${absolute_line:-}" ]] || { echo "has_task=false" >> "$GITHUB_OUTPUT"; exit 0; }

          raw_task="$(sed -n "${absolute_line}p" "$task_file")"
          clean_task="$(printf '%s\n' "$raw_task" | sed 's/^- \[ \] //')"

          slug="$(
            printf '%s' "$clean_task" |
            tr '[:upper:]' '[:lower:]' |
            sed 's/\[[^]]*\]//g' |
            sed 's/[^a-z0-9]+/-/g' |
            sed 's/^-//;s/-$//' |
            cut -c1-48
          )"

          [[ -n "$slug" ]] || slug="task-$absolute_line"

          branch="genesis-run-${{ github.run_id }}-$slug"

          echo "has_task=true" >> "$GITHUB_OUTPUT"
          echo "task_line=$absolute_line" >> "$GITHUB_OUTPUT"

          echo "clean_task<<EOF" >> "$GITHUB_OUTPUT"
          echo "$clean_task" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "raw_task<<EOF" >> "$GITHUB_OUTPUT"
          echo "$raw_task" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "branch_name=$branch" >> "$GITHUB_OUTPUT"

  execute:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.has_task == 'true'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - run: mkdir -p logs && touch logs/updates.log

      - name: Create branch
        if: inputs.execution_mode == 'pr'
        run: |
          git fetch origin "${{ inputs.target_branch }}"
          git checkout -B "${{ needs.validate.outputs.branch_name }}" "origin/${{ inputs.target_branch }}"

      - name: Mark task complete
        if: inputs.log_only == false
        env:
          TASK_LINE: ${{ needs.validate.outputs.task_line }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          p = Path("TASKMASTER.md")
          i = int(os.environ["TASK_LINE"]) - 1
          lines = p.read_text().splitlines()

          if not lines[i].startswith("- [ ] "):
              raise SystemExit("Invalid task state")

          lines[i] = lines[i].replace("- [ ] ", "- [x] ", 1)
          p.write_text("\n".join(lines) + "\n")
          PY

      - name: Log
        run: |
          state="COMPLETE"
          mode="SAFE"
          msg="Task completed"

          if [[ "${{ inputs.log_only }}" == "true" ]]; then
            state="READY"
            mode="ANALYSIS"
            msg="Validated only"
          fi

          {
            echo "----"
            echo "WORKFLOW: GENESIS-RUNTIME"
            echo "STATE: $state"
            echo "MODE: $mode"
            echo "TASK: ${{ needs.validate.outputs.clean_task }}"
            echo "TASK_LINE: ${{ needs.validate.outputs.task_line }}"
            echo "RUN_ID: ${{ needs.validate.outputs.run_id }}"
            echo "RESULT: $msg"
          } >> logs/updates.log

      - name: Commit
        id: changes
        run: |
          git add logs/updates.log
          [[ "${{ inputs.log_only }}" == "false" ]] && git add TASKMASTER.md || true

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: GENESIS-RUNTIME execution"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push direct
        if: steps.changes.outputs.has_changes == 'true' && inputs.execution_mode == 'direct'
        run: git push origin "HEAD:${{ inputs.target_branch }}"

      - name: Push branch
        if: steps.changes.outputs.has_changes == 'true' && inputs.execution_mode == 'pr'
        run: git push --set-upstream origin "${{ needs.validate.outputs.branch_name }}"

      - name: PR
        if: steps.changes.outputs.has_changes == 'true' && inputs.execution_mode == 'pr'
        uses: actions/github-script@v8
        with:
          script: |
            const {owner, repo} = context.repo;
            const head = `${owner}:${process.env.HEAD}`;
            const base = process.env.BASE;

            const prs = await github.rest.pulls.list({owner, repo, head, base});
            if (prs.data.length) return;

            await github.rest.pulls.create({
              owner, repo,
              title: "GENESIS-RUNTIME",
              head: process.env.HEAD,
              base: process.env.BASE,
              body: "Automated runtime execution"
            });
        env:
          HEAD: ${{ needs.validate.outputs.branch_name }}
          BASE: ${{ inputs.target_branch }}

  no_task:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.has_task != 'true'

    steps:
      - run: echo "No tasks"
