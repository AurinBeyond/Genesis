name: Matrix Aurin Bridge Autopilot

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install stripe requests

      - name: Run Matrix Bridge
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SENDOWL_API_KEY: ${{ secrets.SENDOWL_API_KEY }}
          SENDOWL_API_SECRET: ${{ secrets.SENDOWL_API_SECRET }}
        run: python scripts/matrix_bridge.py
