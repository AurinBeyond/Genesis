name: GENESIS-AI-AGENT-V1-7

on:
  workflow_dispatch:
    inputs:
      research_mode:
        description: "Enable research logging"
        required: true
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ai-agent
  cancel-in-progress: true

jobs:
  orchestrate:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate system integrity
        shell: bash
        run: |
          if [ ! -f GENESIS-LAWS.md ]; then
            echo "❌ GENESIS-LAWS.md missing"
            exit 1
          fi

          if [ ! -f TASKMASTER.md ]; then
            echo "❌ TASKMASTER.md missing"
            exit 1
          fi

          echo "✅ Core system validated"

      - name: Extract next task
        id: task
        shell: bash
        run: |
          LINE=$(grep -n -m 1 "^- \[ \]" TASKMASTER.md || true)

          if [ -z "$LINE" ]; then
            echo "has_task=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No tasks found"
            exit 0
          fi

          LINE_NUM=$(echo "$LINE" | cut -d: -f1)
          CONTENT=$(echo "$LINE" | sed 's/^[0-9]*:- \[ \] //')

          echo "has_task=true" >> "$GITHUB_OUTPUT"
          echo "line=$LINE_NUM" >> "$GITHUB_OUTPUT"

          {
            echo "content<<EOF"
            echo "$CONTENT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "🎯 Task found: $CONTENT"

      - name: Stop if no task
        if: steps.task.outputs.has_task == 'false'
        shell: bash
        run: exit 0

      - name: Prepare logs
        shell: bash
        run: |
          touch updates.log
          if [ "${{ inputs.research_mode }}" = "true" ]; then
            touch research.log
          fi

      - name: Execute task
        shell: bash
        run: |
          LINE="${{ steps.task.outputs.line }}"

          sed -i "${LINE}s/^- \\[ \\]/- [x]/" TASKMASTER.md

          {
            echo "---"
            echo "TIME: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "TASK: ${{ steps.task.outputs.content }}"
            echo "STATUS: completed (v1.7 orchestrator)"
          } >> updates.log

          if [ "${{ inputs.research_mode }}" = "true" ]; then
            echo "[$(date -u '+%Y-%m-%d %H:%M:%S UTC')] Research: ${{ steps.task.outputs.content }}" >> research.log
          fi

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            TASKMASTER.md
            updates.log
            research.log
          commit-message: "ai: execute task [v1.7]"
          branch: genesis/agent-${{ github.run_id }}
          delete-branch: true
          title: "🤖 GENESIS TASK EXECUTION"
          body: |
            ## ORCHESTRATOR v1.7

            **Task executed:**
            ${{ steps.task.outputs.content }}

            **System:**
            - GENESIS-LAWS verified
            - TASKMASTER updated
            - Logs generated

      - name: Show PR
        if: steps.cpr.outputs.pull-request-number
        shell: bash
        run: |
          echo "PR: ${{ steps.cpr.outputs.pull-request-url }}"
